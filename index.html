<script>
// =========================
// 🧠 LOCAL STORAGE HELPERS
// =========================
const storage = {
  get(key, def) {
    try { return JSON.parse(localStorage.getItem(key)) ?? def; }
    catch { return def; }
  },
  set(key, val) {
    localStorage.setItem(key, JSON.stringify(val));
  },
  clear() {
    localStorage.clear();
  }
};

// =========================
// 👤 USER SESSION
// =========================
let user = storage.get('user', null);

if (!user) {
  user = { name: "Anonymous", id: Date.now() };
  storage.set('user', user);
}

// =========================
// 🧠 SMARTER CHAT SYSTEM
// =========================
const chatHistory = storage.get('chatHistory', []);

const responses = {
  anxious: [
    "That anxiety sounds really intense. You're not alone in this 💙 Want to tell me what's triggering it?",
    "Your body might be in fight-or-flight mode right now. Let's slow things down together. Breathe in… and out."
  ],
  sleep: [
    "Sleep struggles hit hard 😭 try a no-phone wind-down and dim lighting. Want a full routine?",
    "Your brain might be overstimulated. Let's calm it — slow breathing + journaling helps."
  ],
  overwhelmed: [
    "Okay pause. You're carrying a LOT. What's the ONE thing stressing you most?",
    "We’re not solving everything rn. Just one step. What feels urgent?"
  ],
  default: [
    "I'm here. Talk to me 🤍",
    "That sounds heavy… wanna go deeper into it?",
    "You don’t have to go through this alone.",
    "Tell me more, I’m listening."
  ]
};

function getResponse(text) {
  text = text.toLowerCase();

  if (text.includes("anx") || text.includes("panic")) {
    return random(responses.anxious);
  }
  if (text.includes("sleep") || text.includes("insomnia")) {
    return random(responses.sleep);
  }
  if (text.includes("overwhelm") || text.includes("stress")) {
    return random(responses.overwhelmed);
  }
  return random(responses.default);
}

function random(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// =========================
// 💬 CHAT UI
// =========================
function sendMsg() {
  const inp = document.getElementById('chatInp');
  const val = inp.value.trim();
  if (!val) return;

  addMsg(val, 'user');
  chatHistory.push({ role: 'user', text: val });

  inp.value = '';
  showTyping();

  setTimeout(() => {
    removeTyping();
    const reply = getResponse(val);
    addMsg(reply, 'bot');
    chatHistory.push({ role: 'bot', text: reply });

    storage.set('chatHistory', chatHistory);
  }, 900);
}

function addMsg(text, role) {
  const msgs = document.getElementById('chatMsgs');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('chatMsgs');
  const div = document.createElement('div');
  div.className = 'msg typing';
  div.id = 'typing';
  div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  msgs.appendChild(div);
}

function removeTyping() {
  document.getElementById('typing')?.remove();
}

// restore chat
window.addEventListener('load', () => {
  chatHistory.forEach(m => addMsg(m.text, m.role));
});

// =========================
// 😊 MOOD TRACKER (REAL)
// =========================
let moodHistory = storage.get('moodHistory', [5,4,6,5,7,8,7]);

function logMood() {
  if (!selectedMoodVal) return;

  moodHistory.push(selectedMoodVal);
  if (moodHistory.length > 7) moodHistory.shift();

  storage.set('moodHistory', moodHistory);

  if (window.moodChart) {
    window.moodChart.data.datasets[0].data = moodHistory;
    window.moodChart.update();
  }

  showMoodInsight(selectedMoodVal);
}

function showMoodInsight(val) {
  const el = document.getElementById('moodMsg');
  let msg = "Logged. Keep checking in with yourself 💙";

  if (val <= 3) msg = "Tough day huh… be gentle with yourself today.";
  if (val >= 7) msg = "You're doing great. Keep this energy going ✨";

  el.textContent = msg;
  el.style.display = 'block';
}

// =========================
// 📊 CHART (uses saved data)
// =========================
window.addEventListener('load', () => {
  const ctx = document.getElementById('moodChart').getContext('2d');

  window.moodChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
      datasets: [{
        label: 'Mood',
        data: moodHistory,
        borderColor: '#E07A5F',
        fill: true,
        tension: 0.4
      }]
    }
  });
});

// =========================
// 🔐 PRIVACY / RESET
// =========================
function clearAllData() {
  if (!confirm("Clear all your data?")) return;
  storage.clear();
  location.reload();
}

// =========================
// ✉️ FORM (fake send + save)
// =========================
function submitForm() {
  const msg = document.getElementById('fmsg').value.trim();
  if (!msg) return alert("Write something first");

  const messages = storage.get('contactMsgs', []);
  messages.push({ msg, date: new Date() });
  storage.set('contactMsgs', messages);

  document.getElementById('formSuccess').style.display = 'block';
  document.getElementById('fmsg').value = '';
}
</script>
